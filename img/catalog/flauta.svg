<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/><stop offset="20%" stop-color="#ddd"/>
      <stop offset="50%" stop-color="#fff"/><stop offset="80%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="port" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaa"/><stop offset="50%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#22CC64" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22CC64" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <rect width="320" height="220" fill="url(#glow)"/>

  <!-- Main rail tube (horizontal) -->
  <rect x="28" y="88" width="264" height="44" rx="8" fill="url(#rail)" stroke="#777" stroke-width="1" filter="url(#shadow)"/>
  <!-- Tube end caps -->
  <ellipse cx="28" cy="110" rx="10" ry="22" fill="#888" stroke="#666" stroke-width="1"/>
  <ellipse cx="292" cy="110" rx="10" ry="22" fill="#888" stroke="#666" stroke-width="1"/>
  <!-- Pressure relief cap (left end) -->
  <rect x="15" y="104" width="14" height="12" rx="3" fill="#666" stroke="#444" stroke-width="1"/>
  <circle cx="22" cy="110" r="4" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- End fitting (right) -->
  <polygon points="292,100 305,104 305,116 292,120" fill="#777" stroke="#555" stroke-width="0.5"/>

  <!-- Injector ports (4) -->
  <!-- Port 1 -->
  <rect x="60" y="68" width="20" height="22" rx="4" fill="url(#port)" stroke="#888" stroke-width="1"/>
  <circle cx="70" cy="79" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="64" y="62" width="12" height="8" rx="2" fill="#888" stroke="#666"/>
  <!-- Port 2 -->
  <rect x="110" y="68" width="20" height="22" rx="4" fill="url(#port)" stroke="#888" stroke-width="1"/>
  <circle cx="120" cy="79" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="114" y="62" width="12" height="8" rx="2" fill="#888" stroke="#666"/>
  <!-- Port 3 -->
  <rect x="190" y="68" width="20" height="22" rx="4" fill="url(#port)" stroke="#888" stroke-width="1"/>
  <circle cx="200" cy="79" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="194" y="62" width="12" height="8" rx="2" fill="#888" stroke="#666"/>
  <!-- Port 4 -->
  <rect x="240" y="68" width="20" height="22" rx="4" fill="url(#port)" stroke="#888" stroke-width="1"/>
  <circle cx="250" cy="79" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="244" y="62" width="12" height="8" rx="2" fill="#888" stroke="#666"/>

  <!-- Pressure sensor port (top center) -->
  <rect x="150" y="54" width="20" height="34" rx="4" fill="#777" stroke="#555" stroke-width="1"/>
  <rect x="154" y="46" width="12" height="10" rx="3" fill="#555" stroke="#444"/>
  <circle cx="160" cy="71" r="5" fill="#222" stroke="#555" stroke-width="1"/>
  <!-- Sensor connector wires hint -->
  <line x1="152" y1="54" x2="148" y2="46" stroke="#CC2200" stroke-width="1.5"/>
  <line x1="168" y1="54" x2="172" y2="46" stroke="#1a1aff" stroke-width="1.5"/>

  <!-- Mounting brackets -->
  <rect x="78" y="132" width="14" height="22" rx="2" fill="#666" stroke="#444" stroke-width="0.5"/>
  <circle cx="85" cy="148" r="5" fill="#333" stroke="#444" stroke-width="1"/>
  <rect x="228" y="132" width="14" height="22" rx="2" fill="#666" stroke="#444" stroke-width="0.5"/>
  <circle cx="235" cy="148" r="5" fill="#333" stroke="#444" stroke-width="1"/>

  <!-- Highlight on rail -->
  <line x1="36" y1="98" x2="284" y2="98" stroke="#fff" stroke-width="1.5" opacity="0.2"/>

  <!-- Red accent -->
  <line x1="0" y1="218" x2="320" y2="218" stroke="#22CC64" stroke-width="2"/>

  <text x="80" y="180" font-family="'Arial Narrow',sans-serif" font-size="11" font-weight="bold" fill="#22CC64" letter-spacing="2" opacity="0.9">FLAUTA / RAIL</text>
  <text x="80" y="196" font-family="'Arial Narrow',sans-serif" font-size="9" fill="#444" letter-spacing="1">Common Rail · 4 cilindros</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <rect width="320" height="220" fill="url(#glow)"/>

  <!-- Small injector (left) -->
  <rect x="40" y="30" width="16" height="10" rx="2" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="42" y="40" width="12" height="8" fill="#777" stroke="#555" stroke-width="0.5"/>
  <rect x="44" y="48" width="8" height="50" fill="url(#metal)" stroke="#666" stroke-width="0.5"/>
  <rect x="43" y="72" width="10" height="3" fill="#444"/>
  <polygon points="44,98 52,98 50,112 46,112" fill="#888" stroke="#666" stroke-width="0.5"/>
  <polygon points="46,112 50,112 49,118 47,118" fill="#666" stroke="#444" stroke-width="0.3"/>

  <!-- Valve (center-left) -->
  <rect x="80" y="50" width="24" height="14" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <rect x="84" y="64" width="16" height="36" rx="2" fill="url(#metal)" stroke="#666" stroke-width="0.5"/>
  <rect x="82" y="80" width="20" height="4" fill="#333"/>
  <polygon points="84,100 100,100 98,112 86,112" fill="#888" stroke="#666"/>
  <!-- Valve pins -->
  <line x1="86" y1="57" x2="86" y2="50" stroke="#b8860b" stroke-width="2"/>
  <line x1="94" y1="57" x2="94" y2="50" stroke="#b8860b" stroke-width="2"/>

  <!-- Nozzle/ponteira (center) -->
  <rect x="122" y="44" width="28" height="8" rx="2" fill="#777" stroke="#555" stroke-width="0.5"/>
  <rect x="126" y="52" width="20" height="50" fill="url(#metal)" stroke="#666" stroke-width="0.5"/>
  <line x1="130" y1="56" x2="130" y2="98" stroke="#aaa" stroke-width="0.5" opacity="0.4"/>
  <line x1="142" y1="56" x2="142" y2="98" stroke="#aaa" stroke-width="0.5" opacity="0.4"/>
  <polygon points="124,102 148,102 144,118 128,118" fill="#888" stroke="#666"/>
  <polygon points="130,118 142,118 138,128 134,128" fill="#666" stroke="#444"/>

  <!-- O-rings (scattered) -->
  <ellipse cx="178" cy="60" rx="14" ry="6" fill="none" stroke="#CC2200" stroke-width="3" opacity="0.7"/>
  <ellipse cx="178" cy="78" rx="12" ry="5" fill="none" stroke="#CC2200" stroke-width="2.5" opacity="0.6"/>
  <ellipse cx="200" cy="68" rx="10" ry="4" fill="none" stroke="#CC2200" stroke-width="2" opacity="0.5"/>

  <!-- Copper washers -->
  <ellipse cx="220" cy="100" rx="14" ry="5" fill="none" stroke="#b8860b" stroke-width="3" opacity="0.7"/>
  <ellipse cx="240" cy="108" rx="12" ry="4" fill="none" stroke="#b8860b" stroke-width="2.5" opacity="0.6"/>

  <!-- Clips / clamps -->
  <rect x="188" y="118" width="12" height="28" rx="2" fill="#555" stroke="#444" stroke-width="0.5"/>
  <rect x="186" y="118" width="16" height="4" rx="1" fill="#777" stroke="#555"/>
  <rect x="186" y="142" width="16" height="4" rx="1" fill="#777" stroke="#555"/>
  <rect x="210" y="122" width="12" height="24" rx="2" fill="#555" stroke="#444" stroke-width="0.5"/>

  <!-- Screws -->
  <circle cx="252" cy="90" r="8" fill="#888" stroke="#555" stroke-width="1"/>
  <line x1="248" y1="90" x2="256" y2="90" stroke="#444" stroke-width="2"/>
  <line x1="252" y1="86" x2="252" y2="94" stroke="#444" stroke-width="2"/>
  <circle cx="270" cy="108" r="7" fill="#777" stroke="#555" stroke-width="1"/>
  <line x1="266" y1="108" x2="274" y2="108" stroke="#444" stroke-width="1.5"/>
  <line x1="270" y1="104" x2="270" y2="112" stroke="#444" stroke-width="1.5"/>

  <!-- Spring -->
  <path d="M240,140 Q244,144 248,140 Q252,136 256,140 Q260,144 264,140 Q268,136 272,140 Q276,144 280,140 Q284,136 288,140" stroke="#666" stroke-width="2" fill="none"/>
  <path d="M240,150 Q244,154 248,150 Q252,146 256,150 Q260,154 264,150 Q268,146 272,150 Q276,154 280,150 Q284,146 288,150" stroke="#666" stroke-width="2" fill="none"/>

  <!-- Label area box -->
  <rect x="28" y="158" width="264" height="42" rx="2" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Accent -->
  <line x1="0" y1="218" x2="320" y2="218" stroke="#CE93D8" stroke-width="2"/>

  <text x="50" y="182" font-family="'Arial Narrow',sans-serif" font-size="11" font-weight="bold" fill="#CE93D8" letter-spacing="2" opacity="0.9">KIT DE REPARO</text>
  <text x="50" y="197" font-family="'Arial Narrow',sans-serif" font-size="9" fill="#444" letter-spacing="1">Válvula · Ponteira · O-rings · Vedações</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#555"/><stop offset="30%" stop-color="#ccc"/>
      <stop offset="50%" stop-color="#eee"/><stop offset="70%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="body_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#888"/><stop offset="50%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="320" height="220" fill="url(#bg)"/>
  <rect width="320" height="220" fill="url(#glow)"/>

  <!-- Pump main body (cylindrical housing) -->
  <ellipse cx="180" cy="100" rx="65" ry="75" fill="url(#body_grad)" stroke="#666" stroke-width="1" filter="url(#shadow)"/>
  <!-- Body shading -->
  <ellipse cx="165" cy="95" rx="50" ry="60" fill="none" stroke="#bbb" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="175" cy="98" rx="30" ry="40" fill="none" stroke="#ddd" stroke-width="1" opacity="0.15"/>

  <!-- Drive shaft hole (center front face) -->
  <circle cx="180" cy="100" r="18" fill="#222" stroke="#555" stroke-width="1.5"/>
  <circle cx="180" cy="100" r="12" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <circle cx="180" cy="100" r="5" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Shaft key slot -->
  <rect x="178" y="88" width="4" height="10" fill="#333" stroke="#444" stroke-width="0.5"/>

  <!-- Mounting bolts (4 positions) -->
  <circle cx="140" cy="62" r="7" fill="url(#metal)" stroke="#555" stroke-width="1"/>
  <circle cx="220" cy="62" r="7" fill="url(#metal)" stroke="#555" stroke-width="1"/>
  <circle cx="140" cy="138" r="7" fill="url(#metal)" stroke="#555" stroke-width="1"/>
  <circle cx="220" cy="138" r="7" fill="url(#metal)" stroke="#555" stroke-width="1"/>
  <!-- Bolt hex heads -->
  <polygon points="140,56 145,59 145,65 140,68 135,65 135,59" fill="#777" stroke="#555" stroke-width="0.5"/>
  <polygon points="220,56 225,59 225,65 220,68 215,65 215,59" fill="#777" stroke="#555" stroke-width="0.5"/>
  <polygon points="140,132 145,135 145,141 140,144 135,141 135,135" fill="#777" stroke="#555" stroke-width="0.5"/>
  <polygon points="220,132 225,135 225,141 220,144 215,141 215,135" fill="#777" stroke="#555" stroke-width="0.5"/>

  <!-- High pressure outlet port (top) -->
  <rect x="168" y="18" width="24" height="20" rx="4" fill="#666" stroke="#888" stroke-width="1"/>
  <circle cx="180" cy="28" r="6" fill="#222" stroke="#555" stroke-width="1"/>
  <rect x="172" y="12" width="16" height="8" rx="2" fill="#777" stroke="#555"/>

  <!-- Low pressure inlet port (side) -->
  <rect x="238" y="88" width="22" height="24" rx="4" fill="#666" stroke="#888" stroke-width="1"/>
  <circle cx="249" cy="100" r="6" fill="#222" stroke="#555" stroke-width="1"/>

  <!-- HP body label line details -->
  <line x1="120" y1="80" x2="120" y2="120" stroke="#999" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="80" x2="240" y2="120" stroke="#999" stroke-width="0.5" opacity="0.3"/>

  <!-- Red accent -->
  <line x1="0" y1="218" x2="320" y2="218" stroke="#FF8C00" stroke-width="2"/>

  <!-- Label -->
  <text x="28" y="90" font-family="'Arial Narrow',sans-serif" font-size="11" font-weight="bold" fill="#FF8C00" letter-spacing="2" opacity="0.9">BOMBA</text>
  <text x="28" y="106" font-family="'Arial Narrow',sans-serif" font-size="9" fill="#666" letter-spacing="1">ALTA PRESSÃO</text>
  <text x="28" y="138" font-family="'Arial Narrow',sans-serif" font-size="8" fill="#444">CP3 · CP4</text>
  <text x="28" y="152" font-family="'Arial Narrow',sans-serif" font-size="8" fill="#444">HP3 · HP4</text>
</svg>

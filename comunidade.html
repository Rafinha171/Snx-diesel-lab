<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNX Diesel - Suporte IA</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #e67e22; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; border-bottom: 2px solid #d35400; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user { background: #333; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ia { background: #444; align-self: flex-start; border-left: 4px solid #e67e22; border-bottom-left-radius: 2px; }
        .input-area { background: #222; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; }
        button { background: #e67e22; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

<header>SNX DIESEL - SUPORTE IA</header>

<div id="chat">
    <div class="balao ia">Olá! Sou o assistente técnico da SNX Diesel. Como posso ajudar na oficina hoje?</div>
</div>

<div class="input-area">
    <input type="text" id="pergunta" placeholder="Ex: Pressão rail baixa Hilux..." onkeypress="if(event.key === 'Enter') perguntar()">
    <button onclick="perguntar()">Enviar</button>
</div>

<script>
    async function perguntar() {
        const campo = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const texto = campo.value.trim();

        if (!texto) return;

        // 1. Mostra a pergunta do usuário
        chat.innerHTML += `<div class="balao user">${texto}</div>`;
        campo.value = "";
        chat.scrollTop = chat.scrollHeight;

        // 2. Cria o balão de carregamento
        const loadingId = "loading-" + Date.now();
        chat.innerHTML += `<div class="balao ia" id="${loadingId}">...</div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            // 3. CHAMA A API DO VERCEL (Ajuste importante aqui)
            const response = await fetch('/api/ia-motor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: texto })
            });

            const data = await response.json();

            // 4. Mostra a resposta da IA ou o erro
            if (data.text) {
                document.getElementById(loadingId).innerText = data.text;
            } else {
                document.getElementById(loadingId).innerText = "Erro: " + (data.error || "Sem resposta");
            }
        } catch (erro) {
            document.getElementById(loadingId).innerText = "Erro de conexão. Verifique se o app está no ar.";
        }
        
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>

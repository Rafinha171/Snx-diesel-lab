<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade Diesel - IA</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #e67e22; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .balao { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.4; }
        .user { background: #333; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ia { background: #444; align-self: flex-start; border-left: 4px solid #e67e22; border-bottom-left-radius: 2px; }
        .input-area { background: #222; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; }
        button { background: #e67e22; border: none; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>SNX DIESEL - SUPORTE IA</header>

<div id="chat">
    <div class="balao ia">Olá! Sou o teu assistente técnico. Em que dúvida mecânica posso ajudar hoje?</div>
</div>

<div class="input-area">
    <input type="text" id="pergunta" placeholder="Ex: Pressão rail baixa Hilux...">
    <button onclick="perguntar()">Enviar</button>
</div>

<script src="ia-motor.js"></script>

<script>
    async function perguntar() {
        const campo = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const texto = campo.value.trim();

        if (!texto) return;

        // Adiciona a tua pergunta no ecrã
        chat.innerHTML += `<div class="balao user">${texto}</div>`;
        campo.value = "";
        chat.scrollTop = chat.scrollHeight;

        // Adiciona um balão de "A pensar..."
        const loadingId = "loading-" + Date.now();
        chat.innerHTML += `<div class="balao ia" id="${loadingId}">...</div>`;

        // Chama a função que está no ia-motor.js
        const resposta = await enviarDuvidaParaIA(texto);

        // Substitui o "..." pela resposta real
        document.getElementById(loadingId).innerText = resposta;
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>

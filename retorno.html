<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Retorno de Injetores – SNX Diesel Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:#1C1C1C;color:#F0EDE8;font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(14,14,14,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(204,34,0,0.25)}
.logo{text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;color:#F0EDE8;letter-spacing:0.04em}
.logo span{color:#CC2200}
.back{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#F0EDE8;text-decoration:none;opacity:0.5;transition:opacity 0.2s}
.back:hover{opacity:1}

/* HERO */
.hero{padding:90px 1.5rem 0;max-width:1100px;margin:0 auto}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;padding:3rem 0 2rem}
.hero-left{}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;border:1px solid rgba(204,34,0,0.5);padding:0.25rem 0.8rem;font-family:‘Barlow Condensed’,sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:#CC2200;margin-bottom:1.2rem}
.hero h1{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:clamp(2.2rem,4vw,3.5rem);line-height:0.95;text-transform:uppercase;margin-bottom:1rem}
.hero h1 span{color:#CC2200}
.hero-desc{font-size:0.9rem;opacity:0.6;line-height:1.7;margin-bottom:1.5rem;max-width:420px}
.hero-tags{display:flex;flex-wrap:wrap;gap:0.5rem}
.htag{background:rgba(204,34,0,0.08);border:1px solid rgba(204,34,0,0.2);padding:0.25rem 0.7rem;font-family:‘Barlow Condensed’,sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#CC2200}
.hero-right{background:#141414;border:1px solid rgba(204,34,0,0.2);padding:1.5rem}
.hr-title{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:#CC2200;margin-bottom:1rem}
.info-list{display:grid;gap:0.6rem}
.info-item{display:flex;gap:0.8rem;align-items:flex-start}
.info-dot{width:6px;height:6px;background:#CC2200;border-radius:50%;flex-shrink:0;margin-top:0.4rem}
.info-text{font-size:0.83rem;opacity:0.7;line-height:1.5}
.info-text strong{color:#F0EDE8;font-weight:500}
.divider{border:none;border-top:1px solid rgba(240,237,232,0.06);margin:2rem 0}

/* TIMER */
.timer-section{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem}
.ts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:1rem}
.ts-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:0.08em}
.ts-sub{font-size:0.8rem;opacity:0.45;margin-top:0.15rem}
.timer-card{background:#141414;border:1px solid rgba(204,34,0,0.2);padding:1.5rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.timer-display{text-align:center;min-width:140px}
.td-num{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:5rem;line-height:1;color:#CC2200;letter-spacing:-0.02em;transition:color 0.3s}
.td-num.done{color:#22cc64}
.td-num.warning{color:#ffa500}
.td-label{font-family:‘Barlow Condensed’,sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;margin-top:0.3rem}
.timer-progress{flex:1;min-width:200px}
.tp-bar-bg{height:8px;background:rgba(240,237,232,0.06);border-radius:4px;margin-bottom:1rem;overflow:hidden}
.tp-bar-fill{height:100%;background:#CC2200;border-radius:4px;transition:width 0.5s linear;width:0%}
.tp-bar-fill.done{background:#22cc64}
.timer-btns{display:flex;gap:0.6rem;flex-wrap:wrap}
.tbtn{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.6rem 1.2rem;border:none;cursor:pointer;transition:all 0.2s}
.tbtn-start{background:#CC2200;color:white}
.tbtn-start:hover{background:#E53010}
.tbtn-reset{background:transparent;border:1px solid rgba(240,237,232,0.2);color:#F0EDE8;opacity:0.6}
.tbtn-reset:hover{opacity:1}
.timer-duration{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem}
.timer-duration label{font-family:‘Barlow Condensed’,sans-serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.5}
.timer-duration select{background:#1C1C1C;border:1px solid rgba(240,237,232,0.1);color:#F0EDE8;padding:0.3rem 0.6rem;font-family:‘Barlow Condensed’,sans-serif;font-size:0.85rem;font-weight:600;outline:none;appearance:none}
.timer-status{font-size:0.82rem;opacity:0.5;font-style:italic}
.timer-status.running{color:#ffa500;opacity:1}
.timer-status.done{color:#22cc64;opacity:1}

/* FORM */
.form-section{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem}
.section-header{margin-bottom:1.2rem}
.sh-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:0.08em}
.sh-sub{font-size:0.8rem;opacity:0.45;margin-top:0.15rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.field label{display:block;font-family:‘Barlow Condensed’,sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.45;margin-bottom:0.4rem}
.field select,.field input[type=text],.field input[type=number]{width:100%;background:#141414;border:1px solid rgba(240,237,232,0.1);outline:none;padding:0.7rem 0.9rem;font-family:‘Barlow Condensed’,sans-serif;font-size:0.92rem;font-weight:600;color:#F0EDE8;transition:border-color 0.2s;appearance:none}
.field select:focus,.field input:focus{border-color:#CC2200}
.field input::placeholder{color:rgba(240,237,232,0.2);font-weight:400}

/* REF BOX */
.ref-box{background:#0E0E0E;border:1px solid rgba(204,34,0,0.3);padding:1.2rem 1.5rem;margin-bottom:1.2rem;display:none}
.ref-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.ref-title-wrap{}
.ref-veiculo{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;letter-spacing:0.05em}
.ref-injetor{font-size:0.8rem;opacity:0.5;margin-top:0.2rem}
.ref-alerta{background:rgba(204,34,0,0.1);border:1px solid rgba(204,34,0,0.3);padding:0.4rem 0.8rem;font-family:‘Barlow Condensed’,sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#CC2200;align-self:flex-start}
.ref-limits{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.8rem}
.rl{display:flex;flex-direction:column;align-items:center;background:#1C1C1C;border:1px solid rgba(240,237,232,0.06);padding:0.6rem 1.2rem;min-width:100px;text-align:center}
.rl-num{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.8rem;line-height:1}
.rl-num.ok{color:#22cc64}
.rl-num.warn{color:#ffa500}
.rl-num.bad{color:#CC2200}
.rl-label{font-family:‘Barlow Condensed’,sans-serif;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;margin-top:0.2rem}
.ref-nota{font-size:0.8rem;opacity:0.55;line-height:1.6;border-top:1px solid rgba(240,237,232,0.05);padding-top:0.8rem}
.ref-nota strong{color:#F0EDE8;font-weight:500}
.ref-falhas{margin-top:0.8rem;border-top:1px solid rgba(240,237,232,0.05);padding-top:0.8rem}
.rf-title{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:#CC2200;margin-bottom:0.5rem}
.rf-list{display:flex;flex-wrap:wrap;gap:0.4rem}
.rf-tag{background:rgba(204,34,0,0.07);border:1px solid rgba(204,34,0,0.2);padding:0.2rem 0.55rem;font-size:0.78rem;opacity:0.85}

/* INJETORES */
.inj-section{background:#141414;border:1px solid rgba(240,237,232,0.07);padding:1.2rem;margin-bottom:1rem}
.inj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.inj-title{font-family:‘Barlow Condensed’,sans-serif;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:#CC2200}
.inj-tip{font-size:0.75rem;opacity:0.35}
.inj-grid{display:grid;gap:0.5rem}
.inj-row{display:grid;grid-template-columns:40px 1fr 100px auto;align-items:center;gap:0.8rem;background:#1C1C1C;border:1px solid rgba(240,237,232,0.06);padding:0.7rem 1rem;transition:border-color 0.3s}
.inj-row.ok-row{border-color:rgba(34,204,100,0.2)}
.inj-row.warn-row{border-color:rgba(255,165,0,0.2)}
.inj-row.bad-row{border-color:rgba(204,34,0,0.3)}
.inj-num{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.1rem;color:#CC2200;text-align:center}
.inj-label{font-family:‘Barlow Condensed’,sans-serif;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;opacity:0.6}
.inj-input{background:transparent;border:none;border-bottom:1px solid rgba(240,237,232,0.15);outline:none;padding:0.3rem 0;font-family:‘Barlow Condensed’,sans-serif;font-size:1.2rem;font-weight:900;color:#F0EDE8;width:100%;text-align:center;caret-color:#CC2200;transition:border-color 0.2s}
.inj-input:focus{border-bottom-color:#CC2200}
.inj-input::placeholder{color:rgba(240,237,232,0.15);font-weight:400;font-size:0.9rem}
.inj-unit{font-size:0.72rem;opacity:0.35;font-family:‘Barlow Condensed’,sans-serif;white-space:nowrap;text-align:right}
.inj-status-dot{width:10px;height:10px;border-radius:50%;background:rgba(240,237,232,0.1);transition:background 0.3s}
.inj-status-dot.ok{background:#22cc64}
.inj-status-dot.warn{background:#ffa500}
.inj-status-dot.bad{background:#CC2200}

.btn-calc{width:100%;background:#CC2200;border:none;color:white;padding:1.1rem;font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.8rem}
.btn-calc:hover{background:#E53010}
.btn-calc:disabled{opacity:0.25;cursor:not-allowed}

/* RESULTADO */
.result-section{max-width:1100px;margin:0 auto;padding:0 1.5rem 5rem;display:none}
.rs-header{background:#141414;border:1px solid rgba(204,34,0,0.3);border-top:4px solid #CC2200;padding:1.5rem;margin-bottom:1rem}
.rsh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.2rem}
.rsh-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.4rem;text-transform:uppercase;letter-spacing:0.05em}
.rsh-badge{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.35rem 1rem;border:1px solid}
.rsh-badge.aprovado{background:rgba(34,204,100,0.1);border-color:rgba(34,204,100,0.4);color:#22cc64}
.rsh-badge.atencao{background:rgba(255,165,0,0.1);border-color:rgba(255,165,0,0.4);color:#ffa500}
.rsh-badge.reprovado{background:rgba(204,34,0,0.15);border-color:#CC2200;color:#ff6b6b}
.rsh-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem}
.rm-item{border-left:2px solid rgba(204,34,0,0.3);padding-left:0.8rem}
.rm-lbl{font-size:0.7rem;opacity:0.4;margin-bottom:0.15rem;font-family:‘Barlow Condensed’,sans-serif;text-transform:uppercase;letter-spacing:0.05em}
.rm-val{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.9rem}
.inj-results{display:grid;gap:0.5rem;margin-bottom:1rem}
.ir{background:#141414;border:1px solid rgba(240,237,232,0.06);border-left:4px solid;padding:1rem 1.2rem;display:grid;grid-template-columns:50px 1fr 120px;align-items:center;gap:1rem}
.ir.ok{border-left-color:#22cc64}
.ir.atencao{border-left-color:#ffa500}
.ir.reprovado{border-left-color:#CC2200}
.ir-num{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.5rem;opacity:0.35;text-align:center}
.ir-center{}
.ir-name{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem}
.ir-bar-wrap{height:5px;background:rgba(240,237,232,0.06);border-radius:3px;position:relative}
.ir-bar{height:100%;border-radius:3px}
.ir-bar.ok{background:#22cc64}
.ir-bar.atencao{background:#ffa500}
.ir-bar.reprovado{background:#CC2200}
.ir-bar-line{position:absolute;top:-4px;height:13px;width:2px;background:rgba(240,237,232,0.2)}
.ir-rec{font-size:0.78rem;opacity:0.55;margin-top:0.4rem;line-height:1.5}
.ir-right{text-align:right}
.ir-val{font-family:‘Barlow Condensed’,sans-serif;font-weight:900;font-size:1.6rem;line-height:1}
.ir-val.ok{color:#22cc64}
.ir-val.atencao{color:#ffa500}
.ir-val.reprovado{color:#CC2200}
.ir-status{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;margin-top:0.2rem}
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.stat-card{background:#141414;border:1px solid rgba(240,237,232,0.07);padding:1.2rem}
.sc-lbl{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:#CC2200;margin-bottom:0.8rem}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
.sci-lbl{font-size:0.73rem;opacity:0.4;margin-bottom:0.15rem}
.sci-val{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.95rem}
.sci-val.good{color:#22cc64}
.sci-val.warn{color:#ffa500}
.sci-val.bad{color:#CC2200}
.conclusao-card{background:#0E0E0E;border:1px solid rgba(204,34,0,0.2);padding:1.3rem;margin-bottom:1rem}
.cc-lbl{font-family:‘Barlow Condensed’,sans-serif;font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:#CC2200;margin-bottom:0.7rem}
.cc-text{font-size:0.87rem;opacity:0.78;line-height:1.75}
.cc-fonte{font-size:0.75rem;opacity:0.35;margin-top:0.6rem;font-style:italic}
.action-row{display:flex;gap:0.7rem;flex-wrap:wrap;margin-bottom:1rem}
.btn-pdf{display:inline-flex;align-items:center;gap:0.5rem;background:#CC2200;color:white;border:none;padding:0.7rem 1.3rem;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.btn-pdf:hover{background:#E53010}
.btn-wa{display:inline-flex;align-items:center;gap:0.5rem;background:#25D366;color:white;text-decoration:none;padding:0.7rem 1.3rem;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.2s}
.btn-wa:hover{background:#1da851}
.btn-reset{background:transparent;border:1px solid rgba(240,237,232,0.15);color:#F0EDE8;padding:0.7rem 1.2rem;font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;opacity:0.5;transition:opacity 0.2s}
.btn-reset:hover{opacity:1}

/* HISTORICO */
.hist-section{max-width:1100px;margin:0 auto;padding:0 1.5rem 5rem}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.8rem}
.hist-title{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:0.08em}
.hist-count{font-family:‘Barlow Condensed’,sans-serif;font-size:0.75rem;opacity:0.4;letter-spacing:0.08em}
.hist-empty{text-align:center;padding:2rem;background:#141414;border:1px solid rgba(240,237,232,0.06);opacity:0.4;font-size:0.88rem}
.hist-grid{display:grid;gap:0.5rem}
.hist-item{background:#141414;border:1px solid rgba(240,237,232,0.06);border-left:3px solid;padding:0.9rem 1.2rem;display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:1rem;cursor:pointer;transition:background 0.2s}
.hist-item:hover{background:#1A1A1A}
.hist-item.aprovado{border-left-color:#22cc64}
.hist-item.atencao{border-left-color:#ffa500}
.hist-item.reprovado{border-left-color:#CC2200}
.hi-main{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.9rem;text-transform:uppercase;letter-spacing:0.04em}
.hi-sub{font-size:0.75rem;opacity:0.45;margin-top:0.15rem}
.hi-status{font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase}
.hi-status.aprovado{color:#22cc64}
.hi-status.atencao{color:#ffa500}
.hi-status.reprovado{color:#CC2200}
.hi-date{font-size:0.75rem;opacity:0.35;font-family:‘Barlow Condensed’,sans-serif;white-space:nowrap}
.btn-clear-hist{background:transparent;border:1px solid rgba(240,237,232,0.1);color:#F0EDE8;padding:0.35rem 0.8rem;font-family:‘Barlow Condensed’,sans-serif;font-weight:600;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;opacity:0.4;transition:opacity 0.2s}
.btn-clear-hist:hover{opacity:1}

.wf{position:fixed;bottom:2rem;right:2rem;z-index:200;text-decoration:none}
.wb{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:transform 0.2s;position:relative}
.wb:hover{transform:scale(1.1)}
.wb::before{content:’’;position:absolute;width:58px;height:58px;border-radius:50%;border:2px solid #25D366;animation:wp 2s ease-out infinite}
@keyframes wp{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.6);opacity:0}}
footer{border-top:1px solid rgba(240,237,232,0.05);padding:2rem;text-align:center;font-size:0.78rem;opacity:0.3;font-family:‘Barlow Condensed’,sans-serif;letter-spacing:0.04em}

@media print{
nav,.wf,footer,.timer-section,.hist-section,.action-row,.hero,.divider,.form-section{display:none!important}
body{background:white!important;color:#111!important;font-size:12px}
.result-section{display:block!important;padding:0;margin:0}
/* Todos os cards brancos */
.rs-header,.ir,.stat-card,.conclusao-card,.cards-row,.inj-results{
background:white!important;color:#111!important;
border-color:#ddd!important;
}
/* Bordas coloridas dos injetores */
.ir.ok{border-left-color:#1a7a3f!important}
.ir.atencao{border-left-color:#b37400!important}
.ir.reprovado{border-left-color:#CC2200!important}
/* Valores coloridos */
.ir-val.ok{color:#1a7a3f!important}
.ir-val.atencao{color:#b37400!important}
.ir-val.reprovado{color:#CC2200!important}
.sci-val.good{color:#1a7a3f!important}
.sci-val.warn{color:#b37400!important}
.sci-val.bad{color:#CC2200!important}
/* Textos escuros */
.rsh-title,.ir-name,.sc-lbl,.cc-lbl,.rm-lbl,.rm-val,.sci-lbl,.ir-status,.ir-rec,.cc-text,.cc-fonte{color:#333!important;opacity:1!important}
.rsh-title{color:#111!important;font-size:1.2rem}
/* Badge status */
.rsh-badge.aprovado{background:#e6f7ee!important;border-color:#1a7a3f!important;color:#1a7a3f!important}
.rsh-badge.atencao{background:#fff8e6!important;border-color:#b37400!important;color:#b37400!important}
.rsh-badge.reprovado{background:#fdecea!important;border-color:#CC2200!important;color:#CC2200!important}
/* Barras de progresso */
.ir-bar-wrap{background:#eee!important}
.ir-bar.ok{background:#1a7a3f!important}
.ir-bar.atencao{background:#b37400!important}
.ir-bar.reprovado{background:#CC2200!important}
/* Labels vermelhos */
